spring.application.name=spring-news-app
# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://newsapp-db.cg1408g0kkyh.us-east-1.rds.amazonaws.com:3306/newsapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=5000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG

# News and Weather API key
gnews.api.key=${GNEWS_API_KEY}  # set in environment variable
gnews.api.url=https://gnews.io/api/v4

weather.api.key=${WEATHER_KEY}

file.upload-dir=uploads

# Gmail App setup
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vijiramu@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.url=http://localhost:5173

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# GitHub OAuth
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email


